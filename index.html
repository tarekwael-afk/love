<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:#e2e8f0;
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      text-align:center;
    }
    .card{
      width:min(720px, 92vw);
      background:#111827;
      border:1px solid #1f2937;
      border-radius:16px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    a.btnlink{
      display:inline-block;
      padding:10px 14px;
      border-radius:12px;
      background:#1f2937;
      color:#e2e8f0;
      text-decoration:none;
      border:1px solid #334155;
      cursor:pointer;
    }
    a.btnlink:hover{ background:#273449; }
    .hidden{ display:none; }

    img{
      width:min(380px, 90%);
      border-radius:16px;
      border:1px solid #334155;
      margin-top:16px;
    }

    .choices{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }
    button{
      padding:12px 18px;
      font-size:18px;
      font-weight:700;
      border-radius:14px;
      border:1px solid #334155;
      color:#e2e8f0;
      background:#0b1220;
      cursor:pointer;
      transition:transform .12s ease, font-size .12s ease;
      min-width:140px;
    }
    #yesBtn{ background:#0b2a16; border-color:#14532d; }
    #noBtn{ background:#2a0b10; border-color:#7f1d1d; }

    #msg{
      margin-top:14px;
      min-height:56px;
      padding:12px 14px;
      border-radius:14px;
      border:1px dashed #334155;
      background:rgba(15, 23, 42, .35);
      line-height:1.5;
    }

    #final{
      margin-top:14px;
      padding:14px;
      border-radius:14px;
      border:1px solid #334155;
      background:#0b1220;
      font-size:20px;
      font-weight:800;
    }

    /* small debug badge */
    #debug{
      margin-top:10px;
      font-size:12px;
      opacity:.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="#" class="btnlink" id="startLink">Click here 💌</a>

    <div id="content" class="hidden">
      <img src="minion.jpg" alt="Minion">
      <h2 style="margin:14px 0 6px;">I love you ❤️</h2>
      <p style="margin:0 0 8px; font-size:18px; color:#cbd5e1;">Do you love me too?</p>

      <div class="choices">
        <button id="yesBtn" type="button">YES ✅</button>
        <button id="noBtn" type="button">NO ❌</button>
      </div>

      <div id="msg">(Pick an answer 😄)</div>
      <div id="final" class="hidden">yaaay 💖</div>
      <div id="debug"></div>
    </div>
  </div>

  <script>
    // If you see this text, JS is working.
    const debug = document.getElementById("debug");
    debug.textContent = "JS loaded ✅";

    const startLink = document.getElementById("startLink");
    const content = document.getElementById("content");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const msg = document.getElementById("msg");
    const final = document.getElementById("final");

    const noMessages = [
      "No?? 😭 come on… press YES.",
      "Really?? 😢 I think you meant YES.",
      "Stop playing 😄 hit YES now!",
      "I’m making YES bigger… take the hint 😌",
      "Last chance… say YES 🥺❤️",
      "YES is the correct answer 😎",
      "Look how tiny NO is getting 😂 press YES!"
    ];

    let noCount = 0;
    let yesScale = 1.0;
    let noScale  = 1.0;

    function applyScales(){
      yesBtn.style.transform = `scale(${yesScale})`;
      noBtn.style.transform  = `scale(${noScale})`;
      yesBtn.style.fontSize = (18 + (yesScale - 1) * 10) + "px";
      noBtn.style.fontSize  = (18 + (noScale  - 1) * 10) + "px";
    }
    applyScales();

    startLink.addEventListener("click", (e) => {
      e.preventDefault();
      content.classList.remove("hidden");
      startLink.classList.add("hidden");
    });

    yesBtn.addEventListener("click", () => {
      msg.textContent = "You said YES 🥰";
      final.classList.remove("hidden");
      final.textContent = "yaaay 💖";
      yesBtn.disabled = true;
      noBtn.disabled = true;
      noBtn.style.opacity = "0.45";
    });

    noBtn.addEventListener("click", () => {
      const message = noMessages[Math.min(noCount, noMessages.length - 1)];
      msg.textContent = message;

      noCount++;
      yesScale = Math.min(2.2, yesScale + 0.18);
      noScale  = Math.max(0.45, noScale  - 0.12);
      applyScales();
    });
  </script>
</body>
</html>
